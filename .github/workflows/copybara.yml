name: Sync CLI to public repo

on:
  push:
    branches:
      - master
    paths:
      - "cli/**"
      - "protocol/**"
      - ".github/workflows/copybara.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.COPYBARA_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts

      - name: Sync to abrasive-cli
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          tmp=$(mktemp -d)
          git clone git@github.com:Clavigers/abrasive-cli.git "$tmp"

          # Replace cli/ and protocol/ in the public repo
          rm -rf "$tmp/cli" "$tmp/protocol" "$tmp/.github"
          cp -r cli "$tmp/cli"
          cp -r protocol "$tmp/protocol"

          # Workflows must live at repo root for GitHub Actions
          if [ -d "$tmp/cli/.github" ]; then
            cp -r "$tmp/cli/.github" "$tmp/.github"
          fi

          cd "$tmp"
          git add -A
          if git diff --cached --quiet; then
            echo "There are no changes to sync"
          else
            git commit -m "sync from monorepo ($(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD))"
            git push origin main
          fi
